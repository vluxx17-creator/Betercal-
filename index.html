<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEARCHHEMS PREMIUM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap');

        body {
            margin: 0;
            background: #000;
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            padding: 15px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #00f3ff;
            padding: 20px 0;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #00f3ff;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:active {
            transform: scale(0.95);
            background: rgba(0, 243, 255, 0.1);
            border-color: #00f3ff;
        }

        /* Окно терминала */
        #resultBox {
            display: none;
            background: #050505;
            border: 1px solid #00f3ff;
            border-radius: 8px;
            padding: 15px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #0f0;
            white-space: pre-wrap;
            margin-top: 10px;
            line-height: 1.5;
        }

        #resultBox.active {
            display: block;
        }

        button.back-btn {
            display: none;
            width: 100%;
            padding: 15px;
            background: #ff3366;
            color: #fff;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            font-family: 'Orbitron', sans-serif;
        }

        .status-bar {
            font-size: 10px;
            color: #555;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>SEARCHHEMS PRO</h1>
    </div>

    <div id="menu">
        <div class="card" onclick="startSearch('ip')">🌐 МОДУЛЬ: IP-АДРЕС</div>
        <div class="card" onclick="startSearch('vk')">🟦 МОДУЛЬ: VK / СОЦСЕТИ</div>
        <div class="card" onclick="startSearch('phone')">📱 МОДУЛЬ: НОМЕР ТЕЛЕФОНА</div>
    </div>

    <div id="resultBox"></div>
    
    <button id="backBtn" class="back-btn" onclick="location.reload()">НОВЫЙ ПОИСК</button>

    <div class="status-bar">СВЯЗЬ С СЕРВЕРОМ: УСТАНОВЛЕНА | V3.0</div>

    <script>
        // Твоя активная ссылка Render
        const SERVER_URL = "https://betercal.onrender.com";

        async function startSearch(type) {
            const query = prompt("Введите данные для анализа (IP, ID или Номер):");
            if (!query) return;

            // Прячем меню, показываем терминал
            document.getElementById('menu').style.display = 'none';
            const term = document.getElementById('resultBox');
            term.classList.add('active');
            term.innerHTML = "> Инициализация протоколов...\n> Подключение к удаленному серверу...\n> Сбор данных по цели: " + query + "\n\n";

            try {
                const response = await fetch(`${SERVER_URL}/api/search`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ type: type, query: query })
                });

                if (!response.ok) throw new Error('Ошибка сервера');

                const data = await response.json();
                
                // Эффект постепенного появления текста
                term.innerHTML = "";
                let i = 0;
                const fullText = data.report;
                
                function typeWriter() {
                    if (i < fullText.length) {
                        term.innerHTML += fullText.charAt(i);
                        i++;
                        term.scrollTop = term.scrollHeight; // Скроллим вниз
                        setTimeout(typeWriter, 5); // Скорость печати
                    } else {
                        document.getElementById('backBtn').style.display = 'block';
                    }
                }
                
                typeWriter();

            } catch (error) {
                term.innerHTML = "[КРИТИЧЕСКАЯ ОШИБКА]\n\nНе удалось связаться с сервером.\n1. Проверьте статус Live на Render.\n2. Убедитесь, что EMAIL_USER и DB_URL настроены корректно.\n\n" + error;
                document.getElementById('backBtn').style.display = 'block';
            }
        }
    </script>
</body>
</html>
